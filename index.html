<!DOCTYPE html>
<html>
<head>
<title>DaVinci Bar Digital Menu</title>

<style>
body{
    background:#0b0b0b;
    color:#d4af37;
    font-family:Arial,sans-serif;
    padding:25px;
}

h1{
    text-align:center;
}

.card{
    border:1px solid #d4af37;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

button{
    background:#d4af37;
    color:black;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border-radius:8px;
    border:none;
}

.cart{
    border:2px solid #d4af37;
    padding:20px;
    border-radius:12px;
    margin-top:40px;
}

.order-item{
    border:1px solid #d4af37;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>DaVinci Bar Digital Menu</h1>

<label>Enter Table Number</label>
<input type="text" id="tableNumber" placeholder="e.g Table 7">

<div class="card">
<h2>Classic Beef Burger</h2>
<p>UGX 42,000</p>
<button onclick="addToCart('Classic Beef Burger',42000)">Add to Order</button>
</div>

<div class="card">
<h2>Espresso Martini</h2>
<p>UGX 35,000</p>
<button onclick="addToCart('Espresso Martini',35000)">Add to Order</button>
</div>

<div class="card">
<h2>Aperol Spritz</h2>
<p>UGX 35,000</p>
<button onclick="addToCart('Aperol Spritz',35000)">Add to Order</button>
</div>

<div class="cart">
<h2>Your Order</h2>

<div id="cartItems"></div>

<h3 id="total">Total: UGX 0</h3>

<button onclick="sendOrder()">Submit Order on WhatsApp</button>
</div>

<script>
const restaurantWhatsApp = "256771753680";

let cart = {};

function addToCart(item, price){
    if(cart[item]){
        cart[item].quantity += 1;
    } else {
        cart[item] = {
            price: price,
            quantity: 1
        };
    }

    renderCart();
}

function increaseQuantity(item){
    cart[item].quantity += 1;
    renderCart();
}

function decreaseQuantity(item){
    cart[item].quantity -= 1;

    if(cart[item].quantity <= 0){
        delete cart[item];
    }

    renderCart();
}

function renderCart(){
    const cartItems = document.getElementById("cartItems");

    cartItems.innerHTML = "";

    let total = 0;

    for(let item in cart){
        const quantity = cart[item].quantity;
        const price = cart[item].price;
        const itemTotal = quantity * price;

        total += itemTotal;

        cartItems.innerHTML += `
            <div class="order-item">
                <strong>${item}</strong><br>
                Quantity: x${quantity}<br>
                Subtotal: UGX ${itemTotal.toLocaleString()}<br><br>

                <button onclick="increaseQuantity('${item}')">+</button>
                <button onclick="decreaseQuantity('${item}')">-</button>
            </div>
        `;
    }

    document.getElementById("total").innerHTML =
        `Total: UGX ${total.toLocaleString()}`;
}

function sendOrder(){
    const table = document.getElementById("tableNumber").value;

    if(table.trim() === ""){
        alert("Please enter your table number.");
        return;
    }

    if(Object.keys(cart).length === 0){
        alert("Please add items first.");
        return;
    }

    let total = 0;

    let message =
`🍽️ NEW ORDER

Table: ${table}

Items:
`;

    for(let item in cart){
        const quantity = cart[item].quantity;
        const price = cart[item].price;
        const itemTotal = quantity * price;

        total += itemTotal;

        message += `- ${item} x${quantity} - UGX ${itemTotal.toLocaleString()}
`;
    }

    message += `
Total: UGX ${total.toLocaleString()}
`;

    const encodedMessage = encodeURIComponent(message);

    const whatsappURL =
        `https://wa.me/${restaurantWhatsApp}?text=${encodedMessage}`;

    window.open(whatsappURL, "_blank");
}
</script>

</body>
</html>
